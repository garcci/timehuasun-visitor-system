version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:5.7
    container_name: visitor-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-4P6yliAa@123}
      MYSQL_DATABASE: visitor_system
      MYSQL_USER: visitor
      MYSQL_PASSWORD: ${DB_PASSWORD:-4P6yliAa@123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/logs:/var/log/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --wait_timeout=28800
    networks:
      - visitor-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（可选）
  redis:
    image: redis:6-alpine
    container_name: visitor-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
    networks:
      - visitor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js 后端应用
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: visitor-backend
    restart: always
    env_file:
      - backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 8020
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: visitor
      DB_PASSWORD: ${DB_PASSWORD:-4P6yliAa@123}
      DB_NAME: visitor_system
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8020:8020"
    volumes:
      - ./backend/logs:/app/backend/logs
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - visitor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue3 管理后台（Nginx 托管）
  admin:
    build:
      context: ./admin
      dockerfile: ../docker/Dockerfile.admin
    container_name: visitor-admin
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - visitor-network

  # Nginx 反向代理 + SSL
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: visitor-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8021:8021"
    volumes:
      - ./docker/nginx/data:/data
      - ./docker/nginx/letsencrypt:/etc/letsencrypt
      - ./docker/nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    environment:
      DISABLE_IPV6: 'true'
    depends_on:
      - backend
      - admin
    networks:
      - visitor-network

networks:
  visitor-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
