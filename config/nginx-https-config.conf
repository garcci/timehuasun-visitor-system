# Nginx HTTPS 配置 - visitor.timehuasun.cn
# 使用方法：复制到 /etc/nginx/conf.d/visitor-https.conf

server {
    # HTTPS 监听 8021 端口
    listen 8021 ssl http2;
    server_name visitor.timehuasun.cn;

    # SSL 证书路径（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/visitor.timehuasun.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/visitor.timehuasun.cn/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling（可选，提升性能）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # 安全头配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 反向代理到 Node.js 应用（内网 8020 端口）
    location / {
        proxy_pass http://localhost:8020;
        
        # 必要的请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_cache off;
    }

    # API 接口专门配置（可选）
    location /api {
        proxy_pass http://localhost:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 文件上传大小限制
        client_max_body_size 10M;
    }

    # 管理后台静态资源（生产环境）
    location /admin {
        proxy_pass http://localhost:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查接口（允许直接访问）
    location /health {
        proxy_pass http://localhost:8020;
        access_log off;
    }

    # 日志配置
    access_log /var/log/nginx/visitor.timehuasun.cn.access.log;
    error_log /var/log/nginx/visitor.timehuasun.cn.error.log warn;

    # 文件大小限制
    client_max_body_size 100M;
}

