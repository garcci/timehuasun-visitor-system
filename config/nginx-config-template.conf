## 📊 性能优化建议

### 1. 开启 Gzip 压缩

```nginx
http {
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/xml application/javascript 
               application/x-javascript;
}
```

### 2. 开启缓存

```nginx
location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}
```

### 3. 限流配置

```nginx
http {
    # 定义限流区域
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    server {
        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            # ... 其他配置
        }
    }
}
```

## 🔍 故障排查

### 查看 Nginx 日志

```bash
# 实时查看错误日志
tail -f /var/log/nginx/api.your-domain.com.error.log

# 查看访问日志
tail -f /var/log/nginx/api.your-domain.com.access.log
```

### 常见问题

**问题 1: 502 Bad Gateway**
```bash
# 检查 Node.js 服务是否运行
pm2 status
netstat -tlnp | grep 8020
```

**问题 2: SSL 证书错误**
```bash
# 检查证书文件是否存在
ls -la /etc/nginx/ssl/api.your-domain.com/

# 检查证书权限
sudo chmod 600 /etc/nginx/ssl/*/privkey.pem
```

**问题 3: 无法访问 OA 系统**
```bash
# 测试 OA 系统连通性
curl http://192.168.0.158:8080

# 检查后端日志
pm2 logs visitor-api
```

