# Nginx 反向代理配置模板

## 📋 配置说明

此配置文件用于将外网 HTTPS 请求反向代理到本地 Node.js 应用

## 🔧 完整配置示例

```nginx
# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name api.your-domain.com;
    
    # 所有 HTTP 请求重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    # SSL 证书配置（推荐使用 Let's Encrypt）
    ssl_certificate /etc/nginx/ssl/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.your-domain.com/privkey.pem;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API 接口反向代理
    location /api {
        proxy_pass http://localhost:8020;
        
        # 必要的请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_cache off;
    }

    # 管理后台（如果使用）
    location /admin {
        proxy_pass http://localhost:8021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 日志配置
    access_log /var/log/nginx/api.your-domain.com.access.log;
    error_log /var/log/nginx/api.your-domain.com.error.log;

    # 文件大小限制
    client_max_body_size 10M;
}
```

## 🔒 申请 SSL 证书（Let's Encrypt）

### 方法一：使用 Certbot（推荐）

```bash
# 安装 Certbot
sudo yum install certbot python3-certbot-nginx -y

# 申请证书
sudo certbot --nginx -d api.your-domain.com

# 自动续期测试
sudo certbot renew --dry-run
```

### 方法二：手动申请

1. 访问 [Let's Encrypt](https://letsencrypt.org/)
2. 使用 DNS 验证或 HTTP 验证
3. 下载证书文件并放到指定位置

## 🚀 部署步骤

### 1. 安装 Nginx

```bash
# CentOS/RHEL
sudo yum install nginx -y

# Ubuntu/Debian
sudo apt-get install nginx -y
```

### 2. 创建 SSL 目录

```bash
sudo mkdir -p /etc/nginx/ssl/api.your-domain.com
```

### 3. 上传证书文件

```bash
# 上传证书到服务器
scp fullchain.pem user@server:/tmp/
scp privkey.pem user@server:/tmp/

# 移动到 Nginx 目录
sudo mv /tmp/fullchain.pem /etc/nginx/ssl/api.your-domain.com/
sudo mv /tmp/privkey.pem /etc/nginx/ssl/api.your-domain.com/

# 设置权限
sudo chmod 600 /etc/nginx/ssl/api.your-domain.com/privkey.pem
sudo chmod 644 /etc/nginx/ssl/api.your-domain.com/fullchain.pem
```

### 4. 创建 Nginx 配置文件

```bash
sudo vim /etc/nginx/conf.d/api.your-domain.com.conf
# 粘贴上面的配置内容
```

### 5. 测试配置

```bash
# 测试 Nginx 配置
sudo nginx -t

# 如果测试通过，重启 Nginx
sudo systemctl restart nginx
sudo systemctl enable nginx
```

### 6. 开放防火墙端口

```bash
# CentOS/RHEL (firewalld)
sudo firewall-cmd --permanent --add-service=http
sudo firewall-cmd --permanent --add-service=https
sudo firewall-cmd --reload

# Ubuntu (ufw)
sudo ufw allow 'Nginx Full'
sudo ufw reload
```

## 🧪 测试配置

### 检查 SSL 证书

```bash
curl -I https://api.your-domain.com
```

### 检查重定向

```bash
curl -I http://api.your-domain.com
# 应该返回 301 重定向到 HTTPS
```

