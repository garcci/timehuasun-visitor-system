## 📞 快速参考

### 常用命令

```bash
# 测试配置
nginx -t

# 重启 Nginx
systemctl restart nginx

# 查看状态
systemctl status nginx

# 重新加载配置（不中断连接）
systemctl reload nginx

# 查看日志
journalctl -u nginx -f
```

### 文件位置

- 配置文件：`/etc/nginx/nginx.conf`
- 站点配置：`/etc/nginx/conf.d/`
- 日志文件：`/var/log/nginx/`
- SSL 证书：`/etc/nginx/ssl/`

