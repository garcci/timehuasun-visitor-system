server {
    listen 8021 ssl;
    server_name visitor.timehuasun.cn;

    # SSL 证书配置
    ssl_certificate /root/.acme.sh/visitor.timehuasun.cn_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/visitor.timehuasun.cn_ecc/visitor.timehuasun.cn.key;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Web SSH 终端 (ttyd on port 8022)
    location /terminal/ {
        proxy_pass http://127.0.0.1:8022/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # 管理后台
    location /dashboard {
        alias /home/node/visitor/auto-deploy/current/admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 接口 (Node.js on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP 自动跳转 HTTPS
server {
    listen 8020;
    server_name _;
    return 301 https://$host:8021$request_uri;
}
